spring.application.name=acreditaciones
server.port=8081
server.address=0.0.0.0

# Mongo URI completa (recomendado)
#spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://mongo:27017/posdb}

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Ensure data.sql runs after schema creation
spring.jpa.defer-datasource-initialization=true

#WebClient Config
clients.pos.base-url=http://pos-service:8080
clients.pos.connect-timeout-ms=2000
clients.pos.read-timeout-ms=3000
clients.pos.write-timeout-ms=3000

#Date in Mongo

spring.jackson.data-format=yyyy-MM-dd'T'HH:mm:ss.SSSX
spring.jackson.time-zone=UTC





