
spring.application.name=punto-de-venta-acc

server.port=8080
server.address=0.0.0.0

# Cache
spring.cache.type=redis

# Redis
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=5s

# TTL por defecto para las entradas en cache (5 minutos)
spring.cache.redis.time-to-live=300000


# Logs
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.data.redis.connection=DEBUG

# OpenTelemetry
# ---- M…TRICAS (Micrometer -> OTLP/HTTP -> Mimir) ----
management.otlp.metrics.export.url=http://grafana-lgtm:4318/v1/metrics
management.metrics.export.otlp.step=10s   # opcional, para verlas m·s r·pido en dev

# ---- TRAZAS (OTel -> OTLP/HTTP -> Tempo) ----
management.opentelemetry.tracing.export.otlp.endpoint=http://grafana-lgtm:4318/v1/traces

#===== Logs (si est·s usando export OTLP de logs) =====
# Algunas guÌas lo exponen como logging.export..., otras como opentelemetry.logging...
# Con Spring Boot 4 + starter suele funcionar:
management.opentelemetry.logging.export.otlp.endpoint=http://grafana-lgtm:4318/v1/logs

# Muestreo (100% en dev; en prod bajarlo)
management.tracing.sampling.probability=1.0

# ---- LOG LEVELS ----
logging.level.org.springframework.boot.autoconfigure.opentelemetry=DEBUG




# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 Database Configuration

#spring.datasource.url=jdbc:h2:tcp://h2:1521//opt/h2-data/mydbpdv;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.url=jdbc:h2:mem:myposdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create




